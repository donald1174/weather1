name: Daily Weather Screenshot to Telegram

on:
  schedule:
    # 03:00 UTC = 06:00 바그다드 현지시간 (UTC+3, 서머타임 없음)
    - cron: '0 3 * * *'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행(테스트)도 가능하게

jobs:
  screenshot-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Take dashboard screenshot
        run: node scripts/screenshot.js

      - name: Send screenshot to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F caption="바그다드·비스마야 날씨 · $(date -u +'%Y-%m-%d')" \
            -F photo=@screenshot.png
